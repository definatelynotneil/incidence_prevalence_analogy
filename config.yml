#root/
#   |
#   |_ data/
#   |     |_filename [in config]
#   |
#   |_ out/

dir_data: !!str "data/"
dir_out: !!str "out/"

date_fmt: !!str "%d-%m-%Y"

processing:
  filename: !!str "data_test.csv" #raw/unprocessed

  #if linking Gold/Aurum, set filename above to null
  #removing duplicates from Gold
  filename_gold: !!str ".csv"
  filename_aurum: !!str ".csv"
  map_file_AtoB: !!str "VisionToEmisMigrators.txt"
  map_delim_AtoB: !!str "\t"

  # Condition mapping CSV with columns 'Paper Short Name', 'Gold', 'Aurum'.
  # Gold/Aurum values are column-name fragments (no 'BD_MEDI:' prefix, no ':N' suffix).
  # When set, BD_LIST entries are Paper Short Names looked up in this file.
  # null = BD_LIST entries are treated as direct column names (default).
  condition_map_file: null

  path_hes: null
  col_patid_cprd: "PATIENT_ID"
  col_patid_hes: "patid"

  mergeCols_AtoB: null
    #  ...: ...
  rm_old_cols: True

  combineLevels: null
    #HEALTH_AUTH:
      #KCH: ["London", "South East"]
      #UHB: ["West Midlands", "East Midlands"]
  
  link_imd: !!bool False
  imd_map_file: !!str ".csv"

  # Derived columns: optional extra columns computed from existing data during
  # preprocessing. Each entry is only applied when `enabled: true`.
  derived_columns:
    imd_quintile:
      enabled: !!bool False
      source_col: !!str "IMD_DECILE"   # numeric decile column (1–10) in the data
      output_col: !!str "IMD_QUINTILE"
      quintile_labels:
        - "Q1 (most deprived)"
        - "Q2"
        - "Q3"
        - "Q4"
        - "Q5 (least deprived)"
    age_binary:
      enabled: !!bool False
      source_col: !!str "AGE"           # numeric age-in-years column in the data
      output_col: !!str "AGE_BINARY"
      threshold: !!int 18
      labels:
        - "Under 18"
        - "18 and over"

incprev:
  filename: !!str "dat_processed.parquet"

  col_end_date: !!str "END_DATE"
  col_index_date: !!str "INDEX_DATE"

  # The dates below should be same as the value entered in dexter for data extract.
  start_date:
    inc:
      year: !!int 2001
      month: !!int 1
      day: !!int 1
    prev:
      year: !!int 2001
      month: !!int 7
      day: !!int 1
  end_date:
    inc:
      year: !!int 2003
      month: !!int 12
      day: !!int 31
    prev:
      year: !!int 2003
      month: !!int 12
      day: !!int 31

  # How many parallel processes to run
  # Note: Each process will load the input data into memory, so is memory intensive
  n_processes: !!int 1

  # Column-wise batching: create dat_batch_N.parquet during `process` stage, each
  # holding only the columns needed for that batch (core + demographics + batch BD_).
  # Reduces per-batch memory from the full parquet to a small fraction.
  create_batch_files: !!bool False

  # Row-wise streaming: process the patient file in chunks of this many rows instead
  # of loading it all at once. null disables streaming (default in-memory behaviour).
  streaming_chunk_size: null

  BD_LIST: # null if want to automatically use all outcomes
    - "condition_a"
    - "condition_b"

  batch_size: !!int 1 # how many conditions to process in each paralel process
  INCREMENT_BY_MONTH: !!int 12
  calc_grouped: !!bool True
  DEMOGRAPHY: # edit below, using this format
    #if no DEMOGRAPHY, set as empty list []
    - 'pat_catg_a'
    - 'pat_catg_b'
    - "AGE_CATEGORY"
    - "SEX"
    - ["AGE_CATEGORY", "SEX"]
    - ["AGE_CATEGORY", "SEX", "pat_catg_a"]
    - ["AGE_CATEGORY", "SEX", "pat_catg_b"]
    - ["AGE_CATEGORY", "SEX", "pat_catg_a", "pat_catg_b"]

strd:
  reference_population: "UK Age-Sex Pop Structure.csv"
  age_bins: [0,16,30,40,50,60,70,80,115]
  age_group_labels: ['0-16','17-30','31-40','41-50','51-60','61-70','71-80','81+']

  standard_breakdowns: #overall strd MUST be labelled 'Overall'
    Overall: "AGE_CATEGORY, SEX"
    catg_a: "AGE_CATEGORY, SEX, pat_catg_a"
    catg_b: "AGE_CATEGORY, SEX, pat_catg_b"
    catg_both: "AGE_CATEGORY, SEX, pat_catg_a, pat_catg_b"

zscore:
  # Significance level for ratio confidence intervals (default 0.05 → 95% CI)
  alpha: !!float 0.05
  # Restrict z-score analysis to these Group values. null = use all groups.
  include_groups: null
    # - "catg_a"
    # - "catg_b"

censor:
  #crude censored by default
  n: 10
  strd: True

report:
  table1: True
  table1_catgs:
    - 'AGE_CATEGORY'
    - 'SEX'
    - 'pat_catg_a'
    - 'pat_catg_b'
  table1_nums: []

  crude: True
  catgs_crude:
    - 'Overall'
    - 'AGE_CATEGORY'
    - 'SEX'
    - 'pat_catg_a'
    - 'pat_catg_b'

  strd: True
  catgs_strd:
    - "Overall"
    - "catg_a"
    - "catg_b"

  layout:
    ticklabelstep: 1
    marker_opacity: 1.0
    marker_size: 15
    line_opacity: 0.8
    line_width: 3.5
    error_y_thickness: 2.0
    error_y_width: 2.5
